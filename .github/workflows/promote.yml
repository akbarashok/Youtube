name: YouTube Metadata Automation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  process-youtube-queue:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run safe growth automation suite
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          python process_video.py
          python analytics_report.py
          python keyword_ideas.py
          python content_plan.py
          python thumbnail_ideas.py

      - name: Commit and push updated planning outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add queue.json channel_config.json
          git add output/results.json
          if [ -f output/channel_analytics.json ]; then git add output/channel_analytics.json; fi
          if [ -f output/seo_suggestions.json ]; then git add output/seo_suggestions.json; fi
          if [ -f output/topic_ideas.json ]; then git add output/topic_ideas.json; fi
          if [ -f output/content_calendar.json ]; then git add output/content_calendar.json; fi
          if [ -f output/thumbnail_ideas.json ]; then git add output/thumbnail_ideas.json; fi
          if [ -f error.log ]; then git add error.log; fi
          git diff --cached --quiet && exit 0
          git commit -m "Automated YouTube growth planning update"
          git push
